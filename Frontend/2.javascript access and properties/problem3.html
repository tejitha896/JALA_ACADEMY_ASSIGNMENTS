<!DOCTYPE html>
<html>
<head>
    <title>Counter App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #2196f3, #21cbf3);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .counter-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 300px;
            transition: transform 0.3s;
        }

        .counter-box:hover {
            transform: scale(1.05);
        }

        h2 {
            margin-bottom: 10px;
        }

        #count {
            font-size: 60px;
            color: #1976d2;
            margin: 20px 0;
            transition: all 0.3s ease;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }

        .inc {
            background: #4caf50;
        }

        .dec {
            background: #f44336;
        }

        .reset {
            background: #ff9800;
        }

        button:hover {
            opacity: 0.8;
            transform: scale(1.1);
        }
    </style>
</head>

<body>

<div class="counter-box">
    <h2>Counter App</h2>
    <div id="count">0</div>

    <button class="inc" onclick="increment()">+</button>
    <button class="dec" onclick="decrement()">-</button>
    <button class="reset" onclick="reset()">Reset</button>
</div>

<script>
let count = 0;

function updateDisplay() {
    const display = document.getElementById("count");
    display.innerText = count;

    // simple animation effect
    display.style.transform = "scale(1.2)";
    setTimeout(() => {
        display.style.transform = "scale(1)";
    }, 150);
}

function increment() {
    count++;
    updateDisplay();
}

function decrement() {
    count--;
    updateDisplay();
}

function reset() {
    count = 0;
    updateDisplay();
}
</script>

</body>
</html>
