<!DOCTYPE html>
<html>
<head>
    <title>Iframe & Marquee</title>
    <style>
        body {
            font-family: Arial;
            background: #d1c4e9;
            text-align: center;
        }

        h2 {
            color: #4a148c;
        }

        marquee {
            font-size: 20px;
            color: white;
            background: #7b1fa2;
            padding: 10px;
        }

        iframe {
            margin-top: 20px;
            width: 80%;
            height: 350px;
            border: 4px solid #4a148c;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<marquee behavior="scroll" direction="left">
    Welcome to My Styled Web Page with Iframe and Marquee 🚀
</marquee>

<h2>Embedded Website</h2>

<iframe src="https://www.wikipedia.org"></iframe>

</body>
</html>
