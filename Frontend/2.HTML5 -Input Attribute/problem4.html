<!DOCTYPE html>
<html>
<head>
    <title>Target Attribute</title>
    <style>
        body {
            font-family: Arial;
            background: #e8f5e9;
            text-align: center;
            padding-top: 50px;
        }

        h2 {
            color: #2e7d32;
        }

        a {
            display: inline-block;
            margin: 10px;
            padding: 12px 20px;
            text-decoration: none;
            background: #4caf50;
            color: white;
            border-radius: 8px;
            transition: 0.3s;
        }

        a:hover {
            background: #2e7d32;
        }
    </style>
</head>
<body>

<h2>Target Attribute</h2>

<a href="https://www.google.com" target="_blank">Open Google</a>
<a href="https://www.wikipedia.org" target="_self">Open Wikipedia</a>
<a href="https://www.youtube.com" target="_parent">Open YouTube</a>

</body>
</html>
