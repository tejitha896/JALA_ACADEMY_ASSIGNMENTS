<!DOCTYPE html>
<html>
<head>
    <title>HTML5 Inputs</title>
    <style>
        body {
            font-family: Arial;
            background: #f3e5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        form {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            margin: 8px 0;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        input[type="color"] {
            height: 40px;
        }

        input[type="submit"] {
            background: #6a1b9a;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<form>
    <h2>HTML5 Inputs</h2>

    Number: <input type="number">
    Range: <input type="range">
    Color: <input type="color">
    Date: <input type="date">
    File: <input type="file">
    Time: <input type="time">
    Month: <input type="month">
    Week: <input type="week">
    Email: <input type="email">

    <input type="submit">
</form>

</body>
</html>
