<!DOCTYPE html>
<html>
<head>
    <title>Image Opacity</title>

    <style>
        body {
            font-family: Arial;
            background: #ede7f6;
            text-align: center;
        }

        img {
            width: 300px;
            opacity: 0.5;
            transition: 0.3s;
            border-radius: 10px;
            margin-top: 50px;
        }

        img:hover {
            opacity: 1;
            cursor: pointer;
            transform: scale(1.1);
        }
    </style>
</head>

<body>

<h2>Opacity Effect</h2>

<img src="https://picsum.photos/300" alt="Image">

<p>Hover over the image to change opacity</p>

</body>
</html>
