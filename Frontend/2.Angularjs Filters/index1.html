<!DOCTYPE html>
<html ng-app="filterApp">
<head>
  <title>AngularJS Filters</title>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <script src="app1.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f0f8ff;
      text-align: center;
      padding: 40px;
    }
    .box {
      background: white;
      padding: 20px;
      width: 350px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }
  </style>
</head>

<body ng-controller="filterCtrl">

<div class="box">
  <h2>Filters Example</h2>

  <p>Original: {{ text }}</p>
  <p>Uppercase: {{ text | uppercase }}</p>
  <p>Lowercase: {{ text | lowercase }}</p>
  <p>Date: {{ today | date:'fullDate' }}</p>
  <p>Number: {{ number | number:2 }}</p>

  <p>Custom Filter (reverse): {{ text | reverse }}</p>
</div>

</body>
</html>
