<!DOCTYPE html>
<html ng-app="colorApp">
<head>
  <title>Expression & Color Change</title>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <script src="app1.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
      padding-top: 50px;
    }
    input {
      padding: 10px;
      font-size: 16px;
      margin: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body ng-controller="colorCtrl">
  <h2>AngularJS Expression & Color Change</h2>

  <p>Enter expression: {{ 5 + 5 }}</p>

  <input type="text"
         placeholder="Enter color (red, blue, etc.)"
         ng-model="colorValue"
         ng-style="{'background-color': colorValue}" />
</body>
</html>
