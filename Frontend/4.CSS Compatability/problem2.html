<!DOCTYPE html>
<html>
<head>
    <title>List Styles</title>

    <style>
        body {
            font-family: Arial;
            background: #f1f8e9;
            text-align: center;
        }

        ul {
            display: inline-block;
            text-align: left;
            margin: 20px;
        }

        .disc { list-style-type: disc; }
        .circle { list-style-type: circle; }
        .square { list-style-type: square; }
        .roman { list-style-type: upper-roman; }
    </style>
</head>

<body>

<h2>List Style Types</h2>

<ul class="disc">
    <li>Disc Item</li>
    <li>Disc Item</li>
</ul>

<ul class="circle">
    <li>Circle Item</li>
    <li>Circle Item</li>
</ul>

<ul class="square">
    <li>Square Item</li>
    <li>Square Item</li>
</ul>

<ul class="roman">
    <li>Roman Item</li>
    <li>Roman Item</li>
</ul>

<p>Each list uses different <b>list-style-type</b>.</p>

</body>
</html>
