<!DOCTYPE html>
<html ng-app="validateApp">
<head>
  <meta charset="UTF-8">
  <title>AngularJS Form Validation</title>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <style>
    body { font-family: Arial; margin: 30px; }
    label { display: block; margin-top: 10px; }
    input { padding: 5px; width: 250px; margin-top: 5px; }
    .error { color: red; font-size: 0.9em; }
    .success { color: green; margin-top: 10px; }
  </style>
</head>
<body ng-controller="ValidationController">

  <h2>Form Validation Example</h2>

  <form name="regForm" ng-submit="submitForm()" novalidate>
    <label>Email:
      <input type="email" name="email" ng-model="user.email" required>
      <span class="error" ng-show="regForm.email.$touched && regForm.email.$error.required">Email is required.</span>
      <span class="error" ng-show="regForm.email.$touched && regForm.email.$error.email">Invalid email.</span>
    </label>

    <label>Password (min 6 chars):
      <input type="password" name="password" ng-model="user.password" ng-minlength="6" required>
      <span class="error" ng-show="regForm.password.$touched && regForm.password.$error.required">Password is required.</span>
      <span class="error" ng-show="regForm.password.$touched && regForm.password.$error.minlength">Password too short.</span>
    </label>

    <button type="submit" ng-disabled="regForm.$invalid">Submit</button>
  </form>

  <div class="success" ng-if="submitted">
    Form submitted successfully! Email: {{user.email}}
  </div>

<script>
  angular.module('validateApp', [])
    .controller('ValidationController', function($scope) {
      $scope.user = {};
      $scope.submitted = false;

      $scope.submitForm = function() {
        if ($scope.regForm.$valid) {
          $scope.submitted = true;
        }
      };
    });
</script>
</body>
</html>
